name: python-push-testing

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pytest

      - name: Run tests
        run: |
          uv run pytest tests/