name: flake8-push-linting

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: |
          uv pip install flake8

      - name: Lint with flake8
        run: |
          uv run flake8 src/ tests/